<!DOCTYPE html>
<html>
<head>
    <title>Attendance List</title>
</head>
<body>

<h1>Attendance List</h1>

<table border="1">

<tr>
    <th>Employee</th>
    <th>Date</th>
    <th>Status</th>
</tr>

{% for attendance in attendances %}

<tr>
    <td>{{ attendance.employee.name }}</td>
    <td>{{ attendance.date }}</td>
    <td>{{ attendance.status }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
